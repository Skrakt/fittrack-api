name: hello-fittrack

on:
  push:
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "Hello CI/CD — déclenché par ${{ github.actor }}"

  hello-parallel:
    runs-on: ubuntu-latest
    steps:
      - name: Second job parallèle
        run: echo "Job parallèle — SHA ${{ github.sha }}"
