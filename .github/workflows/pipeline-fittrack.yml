name: pipeline-fittrack

on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set version output
        id: set-version
        run: |
          echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Build
        run: echo "build OK — version 1.0.${{ github.run_number }}"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - name: Test
        run: |
          echo "test OK — version reçue : ${{ needs.build.outputs.version }}"
          npm test

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]

    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Deploy
        run: echo "deploy OK — version ${{ needs.build.outputs.version }} deployed"
